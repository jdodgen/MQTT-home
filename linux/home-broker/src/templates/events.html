<!DOCTYPE html>
<html>
<head>
    <style>{{ style }}</style>
    <title>Events</title>
</head>
<body>
    <h1>Simple Emailer</h1>
    <nav>
        <a href="http://{{ my_ip }}:{{ ports['config_port'] }}">Configuation</a>
        <a href="http://{{ my_ip }}:{{ ports['events_port'] }}">Events</a>
        <a href="http://{{ my_ip }}:{{ ports['cam_port']    }}">Cameras</a>
        <a href="http://{{ my_ip }}:{{ ports['email_port']  }}">Emails</a>
    </nav>
    
<div class="refill-area">
    <h2>Add / Edit Event</h2>
    <form action="/events/add" method="post">
        <input type="text" name="events_name" placeholder="Event Name" value="{{ query.get('refill_name', '') }}" required>
        <input type="text" name="mqtt_topic" placeholder="Topic" value="{{ query.get('refill_topic', '') }}" required>
        <input type="text" name="matching_payload" placeholder="Payload" value="{{ query.get('refill_payload', '') }}">
        <br><br>
        <input type="text" name="subject" placeholder="Email Subject" value="{{ query.get('refill_subj', '') }}" style="width: 100%;">
        <br><br>
        <textarea name="body" placeholder="Email Body" style="width: 100%; height: 60px;">{{ query.get('refill_body', '') }}</textarea>
        <br><br>
        <button type="submit" style="background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer;">Save Event</button>
    </form>
</div>

<table>
    <tr><th>Name</th><th>Topic</th><th>Payload</th><th>Action</th></tr>
    {% for name, topic, payload, change, subj, body in events %}
    <tr>
        <td>{{ name }}</td>
        <td>{{ topic }}</td>
        <td>{{ payload }}</td>
        <td>
            <form action="/events/delete" method="post" style="display:inline;">
                <input type="hidden" name="events_name" value="{{ name }}">
                <button type="submit">Delete & Edit</button>
            </form>
            <a href="/manage?events_name={{ name }}"><button>Link Assets</button></a>
        </td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
