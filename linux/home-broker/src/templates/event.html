<!DOCTYPE html>
<html>
<head><title>MQTT Event Manager</title></head>
<body>
    <h2>MQTT Events</h2>
    <table border="1">
        <tr>
            <th>Name</th><th>Topic</th><th>Payload</th><th>Only Change?</th><th>Subject</th><th>Body</th><th>Action</th>
        </tr>
        {% for name, topic, payload, change, subj, body in events %}
        <tr>
            <td>{{ name }}</td>
            <td>{{ topic }}</td>
            <td>{{ payload }}</td>
            <td>{{ change }}</td>
            <td>{{ subj }}</td>
            <td>{{ body }}</td>
            <td>
                <!-- Form to trigger the HTTP run 
                
                
                <form action="/run-event" method="post" style="display:inline;">
                -->
                    <a href="/manage?events_name={{ name }}">Link Cameras/Emails</a>
                <!--
                    <button type="submit">Run</button>
                </form>

                <!-- Existing Delete Form -->
                <form action="/events/delete" method="post" style="display:inline;">
                    <input type="hidden" name="events_name" value="{{ name }}">
                    <button type="submit" style="color:red;">Delete</button>
                </form>
            </td>
        </tr>
{% endfor %}
    </table>

    <h3>Create New MQTT Event</h3>
    <form action="/events/add" method="post">
        <input type="text" name="events_name" placeholder="Event Name (e.g. GarageOpen)" required><br>
        <input type="text" name="mqtt_topic" placeholder="MQTT Topic" required><br>
        <input type="text" name="matching_payload" placeholder="Matching Payload (e.g. down)" required><br>
        
        <label>Only on Change?</label>
        <select name="only_on_change_of_payload">
            <option value="true">True</option>
            <option value="false">False</option>
        </select><br>
        
        <input type="text" name="subject" placeholder="Email Subject" required><br>
        <textarea name="body" placeholder="Email Body" rows="4" cols="50"></textarea><br>
        
        <button type="submit">Add Event</button>
    </form>
</body>
</html>
