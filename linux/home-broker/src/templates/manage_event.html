<!DOCTYPE html>
<html>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        nav { background: #334; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        nav a { color: white; text-decoration: none; margin-right: 15px; padding: 5px 10px; }
        nav a:hover { background: #555; border-radius: 3px; }
        .active { background: #007bff; border-radius: 3px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .refill-area { background: #f9f9f9; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
    </style>

<body>
<div class="refill-area">
<h2>[{{ event_name }}] Cameras and Email addresses</h2>

<form action="/update-links" method="post">
    <input type="hidden" name="events_name" value="{{ event_name }}">

    <h3>Cameras</h3>
    {% for camera in all_cameras %}
    <label>
        <input type="checkbox" name="cameras" value="{{ camera }}" 
               {{ 'checked' if camera in linked_cameras else '' }}> {{ camera }}
    </label><br>
    {% endfor %}

    <h3>Email Addresses</h3>
    {% for email in all_emails %}
    <label>
        <input type="checkbox" name="emails" value="{{ email }}" 
               {{ 'checked' if email in linked_emails else '' }}> {{ email }}
    </label><br>
    {% endfor %}

    <br>
    <button type="submit">Save Changes</button>
    <a href="/events">Cancel</a>
</form>
</div)
</body>
</html>
